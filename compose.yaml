services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=skilldatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=user'
    ports:
      - '5432:5432'
    volumes:
      - skill-data:/var/lib/postgresql

  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/skilldatabase
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=secret
    depends_on:
      - postgres

volumes:
  skill-data:
